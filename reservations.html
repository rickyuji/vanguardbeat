<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Borscht Beat | 取り置き</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body class="bg-gradient-to-br from-[#0a0a0a] to-[#121212] text-[#f5f5f5] font-sans min-h-[100svh] p-4 md:p-8 selection:bg-[#FFD60A] selection:text-black">
    <div id="app-root" class="mx-auto hidden max-w-5xl space-y-8">
        <header class="relative py-6 text-center">
            <h1 class="text-4xl font-display font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#FFD60A] to-yellow-600 drop-shadow-neon md:text-5xl">Borscht Beat</h1>
            <p class="mt-2 text-xs uppercase tracking-[0.3em] text-[#A1A1AA]">Tonight We honor the hero</p>
            <div class="absolute bottom-0 left-1/2 h-[1px] w-24 -translate-x-1/2 bg-gradient-to-r from-transparent via-[#FFD60A] to-transparent"></div>
        </header>

        <div class="flex min-h-[54px] flex-col gap-3 rounded-lg border border-gray-800 bg-[#161616] px-4 py-3 shadow-md sm:flex-row sm:items-center sm:justify-between sm:px-6">
            <div id="login-status" class="z-10 text-center text-2xl font-medium tracking-wide text-[#FFD60A] sm:text-left"></div>
            <div id="cashback-display" class="hidden mx-auto flex w-fit items-center justify-center rounded-md border border-[#22c55e]/20 bg-black/30 px-3 py-1.5 text-center text-lg font-semibold text-[#22c55e] drop-shadow-[0_0_6px_rgba(34,197,94,0.65)] sm:mx-auto sm:px-3 sm:py-2">
                キャッシュバック: <span id="cashback-amount" class="ml-1">¥0</span>
            </div>
            <button id="logout-btn" class="z-10 hidden text-sm font-bold uppercase tracking-widest text-gray-500 transition-colors hover:text-red-500">Logout</button>
        </div>

        <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
            <div class="group relative h-fit rounded-xl border border-gray-800 bg-[#161616] p-5 shadow-2xl sm:p-6 lg:col-span-1">
                <div class="pointer-events-none absolute inset-0 rounded-xl border border-[#FFD60A]/0 transition-colors group-hover:border-[#FFD60A]/20"></div>
                <h2 class="mb-6 border-b border-gray-800 pb-3 text-lg font-display font-bold tracking-wide text-white">取り置き追加</h2>

                <form id="reservation-form" class="space-y-5">
                    <div>
                        <label for="guest-name" class="mb-1 block text-xs font-bold uppercase tracking-widest text-[#A1A1AA]">取り置きのお名前</label>
                        <input type="text" id="guest-name" required placeholder="例）テン　モン" pattern="^[ァ-ヶー]+　[ァ-ヶー]+$" title="カタカナで、全角スペースを1つ入れて入力してください" class="w-full rounded-md border border-gray-800 bg-[#0a0a0a] p-3 text-[16px] text-white transition-all focus:border-[#FFD60A] focus:outline-none focus:ring-1 focus:ring-[#FFD60A]">
                    </div>

                    <div>
                        <label for="ticket-count" class="mb-1 block text-xs font-bold uppercase tracking-widest text-[#A1A1AA]">枚数</label>
                        <input type="number" id="ticket-count" required min="1" value="1" class="w-full rounded-md border border-gray-800 bg-[#0a0a0a] p-3 text-[16px] text-white transition-all focus:border-[#FFD60A] focus:outline-none focus:ring-1 focus:ring-[#FFD60A]">
                    </div>

                    <button type="submit" id="submit-btn" class="mt-4 w-full rounded-md bg-[#FFD60A] px-4 py-3 font-black uppercase tracking-widest text-black transition-all duration-300 hover:bg-yellow-400 hover:shadow-[0_0_20px_rgba(255,214,10,0.3)]">追加</button>

                    <div id="status-message" class="mt-4 hidden rounded border p-3 text-center text-sm font-bold tracking-wide"></div>
                </form>
            </div>

            <div class="flex flex-col overflow-hidden rounded-xl border border-gray-800 bg-[#161616] shadow-2xl lg:col-span-2">
                <div class="flex flex-col gap-3 border-b border-gray-800 bg-[#121212]/90 p-4 backdrop-blur-md sm:flex-row sm:items-center sm:justify-between sm:p-6">
                    <h2 class="text-lg font-display font-bold tracking-wide text-white sm:text-2xl">取り置きリスト</h2>
                    <div class="flex items-center gap-2 sm:gap-3">
                        <button id="export-btn" class="hidden min-h-[40px] inline-flex items-center gap-2 rounded-md border border-[#FFD60A]/40 bg-[#FFD60A]/10 px-3 py-1.5 text-xs font-black uppercase tracking-widest text-[#FFD60A] transition-all hover:bg-[#FFD60A] hover:text-black hover:shadow-[0_0_18px_rgba(255,214,10,0.35)]">エクセル</button>
                        <button id="refresh-btn" aria-label="取り置き一覧を更新" class="flex min-h-[40px] min-w-[40px] items-center justify-center rounded-md border border-gray-800 bg-[#1a1a1a] text-[#A1A1AA] transition-all hover:border-[#FFD60A]/40 hover:bg-[#FFD60A]/10 hover:text-[#FFD60A] hover:shadow-[0_0_10px_rgba(255,214,10,0.2)]">
                            <svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                                <path d="M3 3v5h5"/>
                                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                                <path d="M16 21v-5h5"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="custom-scrollbar flex-1 overflow-x-auto p-2">
                    <table class="min-w-full border-collapse text-left">
                        <thead>
                            <tr class="border-b border-gray-800/50 text-xs uppercase tracking-widest text-[#A1A1AA]">
                                <th class="p-4 font-semibold">お名前</th>
                                <th class="p-4 font-semibold text-center">枚数</th>
                                <th class="p-4 font-semibold text-right">アクセス</th>
                            </tr>
                        </thead>
                        <tbody id="reservations-body">
                            <tr>
                                <td colspan="3" class="p-8 text-center font-medium tracking-wide text-gray-600">データがありません</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer class="relative mt-8 py-8 text-center">
            <div class="absolute top-0 left-1/2 h-[1px] w-32 -translate-x-1/2 bg-gradient-to-r from-transparent via-[#FFD60A] to-transparent"></div>
            <a href="https://maps.app.goo.gl/NVhFEDvC7bw6SrYU8" target="_blank" rel="noopener noreferrer" class="inline-block">
                <h2 class="mt-4 text-xl font-display font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#FFD60A] to-yellow-600 drop-shadow-neon md:text-3xl">8/31 @Spade Box</h2>
            </a>
            <p class="mt-2 text-xs uppercase tracking-[0.3em] text-[#A1A1AA]">See you in my dream</p>
        </footer>
    </div>
</body>
</html>
