<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Borscht Beat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
    <script src="home.js" defer></script>
</head>
<body class="relative bg-[#0f0f0f] text-[#F5F5F0] font-sans min-h-[100svh] p-4 md:p-8 selection:bg-[#FFD60A] selection:text-black">

    <!-- Ambient scan/grid texture -->
    <div class="scan-layer" aria-hidden="true"></div>

    <!-- ============ LOGIN MODAL ============ -->
    <div id="login-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/85 px-4 backdrop-blur-md">
        <div class="frame relative w-full max-w-md overflow-hidden rounded-md border border-[#FFD60A]/15 bg-[#0a0a0a]/95 shadow-[0_0_60px_rgba(255,214,10,0.08)]">
            <div class="h-[2px] w-full bg-[#FFD60A] shadow-[0_0_15px_#FFD60A]"></div>

            <div class="p-6 sm:p-9">
                <div class="mb-8 flex items-center justify-between border-b border-[#FFD60A]/15 pb-4">
                    <div>
                        <h2 class="font-display text-2xl font-black uppercase tracking-wider text-[#FFD60A] drop-shadow-neon">Access Panel</h2>
                    </div>
                    <span class="pulse-dot"></span>
                </div>

                <div class="space-y-5">
                    <div>
                        <label for="login-band" class="mb-2 flex items-center gap-2 font-mono text-[11px] font-semibold uppercase tracking-[0.25em] text-[#a1a1aa]">
                            Band Name
                        </label>
                        <input id="login-band" autocomplete="username" class="w-full rounded-sm border border-[#26261f] bg-[#050505] px-4 py-3 text-[16px] text-white shadow-inner outline-none transition-all placeholder:text-[#4a4a4f] focus:border-[#FFD60A] focus:ring-1 focus:ring-[#FFD60A]/60" placeholder="バンド名">
                    </div>

                    <div>
                        <label for="login-password" class="mb-2 flex items-center gap-2 font-mono text-[11px] font-semibold uppercase tracking-[0.25em] text-[#a1a1aa]">
                            Password
                        </label>
                        <input id="login-password" type="password" autocomplete="current-password" class="w-full rounded-sm border border-[#26261f] bg-[#050505] px-4 py-3 text-[16px] text-white shadow-inner outline-none transition-all placeholder:text-[#4a4a4f] focus:border-[#FFD60A] focus:ring-1 focus:ring-[#FFD60A]/60" placeholder="••••••••">
                    </div>

                    <button id="login-submit" class="group relative w-full overflow-hidden rounded-sm bg-[#FFD60A] px-4 py-3.5 font-display text-sm font-black uppercase tracking-[0.25em] text-black transition-all duration-300 hover:shadow-[0_0_25px_rgba(255,214,10,0.5)]">
                        <span class="relative z-10">Enter System</span>
                    </button>

                    <div id="login-message" class="text-center font-mono text-sm font-medium text-red-500" aria-live="polite"></div>

                    <button id="login-close" class="w-full rounded-sm border border-[#26261f] px-4 py-3 font-mono text-[12px] font-bold uppercase tracking-[0.25em] text-[#84848c] transition-colors hover:border-[#3a3a3a] hover:text-white">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ APP ROOT ============ -->
    <main id="app-root" class="relative z-10 mx-auto max-w-5xl space-y-8">

        <!-- Header -->
        <header class="relative pt-8 pb-2 text-center">
            <p class="mb-3 font-mono text-[16px] uppercase tracking-[0.5em] text-[#8a7409]">Borscht Presents</p>
            <h1 class="font-display text-4xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#FFD60A] via-[#ffe45c] to-[#c9a300] drop-shadow-neon md:text-7xl">
                Borscht Beat
            </h1>

            <div class="mt-8 flex items-center justify-center gap-1.5" aria-hidden="true">
                <span class="eq-bar" style="--d:0s"></span>
                <span class="eq-bar" style="--d:0.15s"></span>
                <span class="eq-bar" style="--d:0.3s"></span>
                <span class="eq-bar" style="--d:0.45s"></span>
                <span class="eq-bar" style="--d:0.6s"></span>
                <span class="eq-bar" style="--d:0.3s"></span>
                <span class="eq-bar" style="--d:0.15s"></span>
            </div>
        </header>

        <!-- Event data + Lineup: stacked on mobile, side-by-side on desktop -->
        <div class="grid grid-cols-1 items-start justify-items-center gap-8 md:grid-cols-2 md:gap-6">
            <section class="frame relative w-full max-w-md md:max-w-sm rounded-md border border-[#FFD60A]/15 bg-[#0a0a0a]/70 px-6 py-8 sm:px-8">
                <div class="mb-5 flex items-center justify-between border-b border-[#FFD60A]/15 pb-4">
                    <h2 class="font-display text-2xl font-bold uppercase tracking-[0.2em] text-white">Lineup</h2>
                </div>

                <ul class="custom-scrollbar max-h-[420px] space-y-1 overflow-y-auto">
                    <li class="lineup-row"><span class="lineup-name text-xl font-semibold text-[#FFD60A]">BORSCHT</span></li>
                    <li class="lineup-row"><span class="lineup-name">Lily of the Valley</span></li>
                    <li class="lineup-row"><span class="lineup-name">La Plata Dolphin</span></li>
                    <li class="lineup-row"><span class="lineup-name">ØROKAMONO</span></li>
                    <li class="lineup-row"><span class="lineup-name">WALABE</span></li>
                    <li class="lineup-row lineup-row--muted"><span class="lineup-name">and more...</span></li>
                </ul>
            </section>

            <section class="frame relative w-full max-w-md md:max-w-lg rounded-md border border-[#FFD60A]/15 bg-[#0a0a0a]/70 px-6 py-8 sm:px-10">

                <h2 class="font-display text-2xl font-bold uppercase tracking-wider text-white sm:text-3xl">
                    2026.08.31
                </h2>
                <p class="font-display mt-1 text-xl text-[#FFD60A]">@SPADE BOX</p>

                <div class="my-7 h-px w-full bg-gradient-to-r from-transparent via-[#FFD60A]/20 to-transparent"></div>

                <dl class="grid grid-cols-2 gap-y-5 text-center font-mono">
                    <div class="border-r border-[#FFD60A]/20">
                        <dt class="text-[12px] uppercase tracking-[0.3em] text-[#84848c]">Open</dt>
                        <dd class="mt-1 text-xl font-semibold text-[#f5f5f0]">10:30</dd>
                    </div>

                    <div>
                        <dt class="text-[12px] uppercase tracking-[0.3em] text-[#84848c]">Adv</dt>
                        <dd class="mt-1 text-xl font-semibold text-[#FFD60A]">¥1,400</dd>
                    </div>

                    <div class="border-r border-[#FFD60A]/20">
                        <dt class="text-[12px] uppercase tracking-[0.3em] text-[#84848c]">Start</dt>
                        <dd class="mt-1 text-xl font-semibold text-[#f5f5f0]">11:00</dd>
                    </div>

                    <div>
                        <dt class="text-[12px] uppercase tracking-[0.3em] text-[#84848c]">Door</dt>
                        <dd class="mt-1 text-xl font-semibold text-[#FFD60A]">¥1,900</dd>
                    </div>
                </dl>
            </section>

            
        </div>

        <footer class="relative mt-2 pt-6 pb-4 text-center">
            <a href="https://maps.app.goo.gl/NVhFEDvC7bw6SrYU8" target="_blank" rel="noopener noreferrer" class="inline-block transition-opacity hover:opacity-80">
                <h2 class="mt-4 font-display text-lg font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#FFD60A] via-[#ffe45c] to-[#c9a300] drop-shadow-neon md:text-2xl">8/31 @Spade Box</h2>
            </a>
            <p class="mt-2 font-mono text-[11px] uppercase tracking-[0.3em] text-[#84848c]">See you in my dream</p>
        </footer>
        
        <div class="pt-4 pb-6">
            <div class="mx-auto mb-6 h-px w-48 bg-gradient-to-r from-transparent via-[#FFD60A]/40 to-transparent"></div>

            <div class="flex justify-center">
                <button id="open-login" type="button" class="group inline-flex items-center gap-3 rounded-md bg-[#FFD60A] px-10 py-4 font-display text-sm font-black uppercase tracking-[0.25em] text-black transition-all duration-300 hover:shadow-[0_0_30px_rgba(255,214,10,0.6)]">
                    Band Login
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:translate-x-1">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
