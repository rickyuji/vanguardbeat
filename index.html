<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Borscht Beat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="style.css">
    <script src="home.js" defer></script>
</head>
<body class="bg-gradient-to-br from-[#0a0a0a] to-[#121212] text-[#f5f5f5] font-sans min-h-[100svh] p-4 md:p-8 selection:bg-[#FFD60A] selection:text-black">
    <div id="login-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 px-4 backdrop-blur-md">
        <div class="w-full max-w-md overflow-hidden rounded-2xl border border-[#FFD60A]/20 bg-[#161616]/95 shadow-[0_0_40px_rgba(255,214,10,0.12)]">
            <div class="h-1 w-full bg-[#FFD60A] shadow-[0_0_15px_#FFD60A]"></div>
            <div class="p-6 sm:p-8">
                <div class="mb-6 text-center">
                    <h2 class="text-3xl font-display font-black uppercase tracking-wider text-[#FFD60A] drop-shadow-neon">ACCESS</h2>
                    <p class="mt-2 text-xs uppercase tracking-[0.3em] text-[#A1A1AA]">Band login</p>
                </div>

                <div class="space-y-5">
                    <div>
                        <label for="login-band" class="mb-1 block text-xs font-bold uppercase tracking-widest text-[#e3e3e6]">Band Name</label>
                        <input id="login-band" autocomplete="username" class="w-full rounded-md border border-gray-800 bg-[#0a0a0a] p-3 text-[16px] text-white shadow-inner transition-all focus:border-[#FFD60A] focus:outline-none focus:ring-1 focus:ring-[#FFD60A]" placeholder="バンド名">
                    </div>

                    <div>
                        <label for="login-password" class="mb-1 block text-xs font-bold uppercase tracking-widest text-[#e3e3e6]">Password</label>
                        <input id="login-password" type="password" autocomplete="current-password" class="w-full rounded-md border border-gray-800 bg-[#0a0a0a] p-3 text-[16px] text-white shadow-inner transition-all focus:border-[#FFD60A] focus:outline-none focus:ring-1 focus:ring-[#FFD60A]" placeholder="••••••••">
                    </div>

                    <button id="login-submit" class="w-full rounded-md bg-[#FFD60A] px-4 py-3 font-black uppercase tracking-widest text-black transition-all duration-300 hover:bg-yellow-400 hover:shadow-[0_0_20px_rgba(255,214,10,0.4)]">Enter System</button>
                    <div id="login-message" class="text-center text-sm font-medium text-red-500" aria-live="polite"></div>
                    <button id="login-close" class="w-full rounded-md border border-gray-800 px-4 py-3 text-xs font-bold uppercase tracking-widest text-gray-400 transition-colors hover:border-gray-700 hover:text-white">Close</button>
                </div>
            </div>
        </div>
    </div>

    <main id="app-root" class="mx-auto max-w-5xl space-y-12">
        <header class="relative py-6 text-center">
            <p class="pb-2 text-base uppercase tracking-[0.3em] text-[#A1A1AA]">Borscht presents</p>
            <h1 class="text-5xl font-display font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#FFD60A] to-yellow-600 drop-shadow-neon md:text-6xl">Borscht Beat</h1>
            <div class="absolute bottom-0 left-1/2 h-[1px] w-48 -translate-x-1/2 bg-gradient-to-r from-transparent via-[#FFD60A] to-transparent"></div>
        </header>

        <div class="flex w-full justify-center">
    <div class="relative flex w-full max-w-sm flex-col items-center justify-center p-6 text-center">

        <div class="pointer-events-none absolute inset-0 rounded-xl border border-[#FFD60A]/30"></div>

            <h2 class="mb-4 w-full border-b border-[#FFD60A]/30 pb-3 text-center text-2xl font-display font-bold tracking-wide text-white">Bands</h2>

            <ul class="custom-scrollbar max-h-[500px] w-full space-y-5 overflow-y-auto">
                <li><span class="text-base font-medium tracking-wide">BORSCHT</span></li>
                <li><span class="text-base font-medium tracking-wide">Lily of the Valley</span></li>
                <li><span class="text-base font-medium tracking-wide">La Plata Dolphin</span></li>
                <li><span class="text-base font-medium tracking-wide">ØROKAMONO</span></li>
                <li><span class="text-base font-medium tracking-wide">WALABE</span></li>
                <li><span class="text-base font-medium tracking-wide">and more...</span></li>
            </ul>

        </div>
    </div>

        <div class="relative flex flex-col items-center">
            <h2 class="mb-4text-center text-2xl font-display font-bold uppercase tracking-wider text-[#FFD60A]">2026.08.31 @SPADE BOX</h2>

            <div class="w-full max-w-sm space-y-2">
                <h3 class="grid grid-cols-[1fr_auto_1fr] gap-x-3 text-lg font-display font-bold uppercase tracking-wider text-[#A1A1AA]">
                    <span class="text-right">OPEN 10:30</span>
                    <span class="text-[#FFD60A]">|</span>
                    <span class="text-left">START 11:00</span>
                </h3>

                <h3 class="grid grid-cols-[1fr_auto_1fr] gap-x-3 text-lg font-display font-bold uppercase tracking-wider text-[#A1A1AA]">
                    <span class="text-right">ADV: ¥1400</span>
                    <span class="text-[#FFD60A]">|</span>
                    <span class="text-left">DOOR: ¥1900</span>
                </h3>
            </div>
        </div>

        <div class="absolute bottom-0 left-1/2 h-[1px] w-48 -translate-x-1/2 bg-gradient-to-r from-transparent via-[#FFD60A] to-transparent"></div>


        <div class="flex justify-center pb-4">
            <button id="open-login" type="button" class="group inline-flex items-center gap-3 rounded-md bg-[#FFD60A] px-10 py-4 font-display font-black uppercase tracking-[0.2em] text-black transition-all duration-300 hover:bg-yellow-400 hover:shadow-[0_0_25px_rgba(255,214,10,0.6)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:translate-x-1">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                Band Login
            </button>
        </div>
    </main>
</body>
</html>
